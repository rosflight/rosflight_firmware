name: Varmint Boards Build

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: checkout submodules
      run: git submodule update --init --recursive
    - name: install toolchain
      run: sudo apt -y install gcc-arm-none-eabi ninja-build
    - name: check toolchain
      run: |
        arm-none-eabi-gcc --version
        ninja --version
    - name: build varmint_10X
      run: |
        cmake --preset varmint-10X
        cmake --build build/varmint-10X 
    - name: build varmint_11X
      run: |
        cmake --preset varmint-11X
        cmake --build build/varmint-11X 
    - name: build pixracer pro
      run: mkdir pixracer_pro_build && cd pixracer_pro_build && cmake -G Ninja .. -DBOARD_TO_BUILD=pixracer_pro && ninja